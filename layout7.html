<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webdev layout

    </title>
    <STYLE>
        *{
            margin: 2;
        }
        .l{ padding-top: 10px;
            background-color: bisque;
            height: 50px;
            box-sizing: border-box;
        }
        .nav{
            text-align: center;
            background-color: bisque;
            height: 40px;
            padding-top: 10px;
        } 
        .head{
            background-color: bisque;
            text-align: center;
            height: 40px;
             padding-top: 10px;
        }
        .sidebar{
            padding: 150px;
            box-sizing: border-box;
             height: 300px;
            width: 500px;
            background-color: bisque;
            display: inline-block;

        }
        .main{background-color: bisque;
            display: inline-block;
            height: 300px;
            width: 720px;
             padding: 150px;
            box-sizing: border-box;
        }
        .foot{
            background-color: bisque;
            height: 70px;
            padding-top: 20px;
            box-sizing: border-box;
            
        }
        
    </STYLE>
</head>
<body>
    <h2 class="l">LOGO</h2>
    <h3 class="nav">NAVIGATION BAR</h3>
    <h3 class="head">HEADER</h3>
    <h3 class="sidebar">SIDEBAR</h3>
    <h3 class="main">MAIN</h3>
    <h3 class="foot">FOOTER</h3>



    
</body>
</html>
