<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=., initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 250px;
            width: 250px;
            background-color: antiquewhite;
            position: absolute;
            top: 0px;
            left: 0px;
            

        }
        .item1{
            height: 70px;
            width: 70px;
            border: 3px solid red;
            position: absolute;
            border-radius: 50%;
            top: 30px;
            left: 20px;
            
        }
        .item2{
            height: 70px;
            width: 70px;
            border: 3px solid red;
            position: absolute;
            top:30px ;
            right: 20px;
            border-radius: 50%;
            
        }
        .item3{
            height: 70px;
            width: 70px;
            border: 3px solid red;
            position: absolute;
            bottom: 20px;
            left: 20px;
            border-radius: 50%;
            
        }
        .item4{
            height: 70px;
            width: 70px;
            border: 3px solid red;
            position: absolute;
            bottom: 20px;
            right: 20px;
            border-radius: 50%;
            
        }
        img{
            height: 70px;
            width: 70px;
            border-radius: 50%;
        }
        .title{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="title">BESTSELLER</div>
        <div class="item1"><img src="g.png" alt="" ></div>
        <div class="item2"><img src="g.png" alt=""></div>
        <div class="item3"><img src="g.png" alt=""></div>
        <div class="item4"><img src="g.png" alt=""></div>
    </div>
    
</body>
</html>
