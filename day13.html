<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        .box{
            height: 200px;
            width: 200px;
            background-color: aqua;
            animation: move 2s ease 1s infinite alternate;
        }
        @keyframes move{
            0%{
                transform: translate(0px,0px);
            }
            25%{
                transform:translate(200px,50px ) rotate(90deg) ;
                background-color: yellow;

            }
            50%{
                transform: translate(400px,100px) rotate(180deg);
                background-color: blueviolet;
            }
            100%{
                transform: translate(600px,150px) rotate(270deg);
                background-color: blue;
            }
        }
    </style>

</head>
<body>
    <div class="box"></div>
</body>
</html>
