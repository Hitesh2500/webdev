<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>

        }
        .headnav{

            height: 120px;

        }

        }
        .navitem{width: 70px;

            background-color: aliceblue;

            display: flex;
            

        }
        

    </style>

        <div class="nav">
